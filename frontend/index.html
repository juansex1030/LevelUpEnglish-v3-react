<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rocket.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>English Classes - LevelUpEnglish</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- ePayco SDK -->
    <script src="https://checkout.epayco.co/checkout.js"></script>
  </head>
  <body class="no-transition">
    <script>
        (function () {
            // Default to dark mode if no preference is saved
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-bs-theme', theme);
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            }
        })();
    </script>
    <div id="root"></div>
    <script>
        // MASTERPIECE GLOBAL AUDIO ENGINE (Replicating Vocabulary.jsx logic)
        (function() {
            window.playAudio = function(text) {
                if (!text || typeof text !== 'string') return;
                
                // Evita que la API se quede "atascada" si hubo errores previos
                window.speechSynthesis.cancel(); 
                
                const cleanText = text.split('/')[0].trim();
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; 
                
                utterance.onerror = (e) => console.error("Speech Synthesis Error:", e);
                window.speechSynthesis.speak(utterance);
            };

            // Detect clicks on [data-audio] and bridge to playAudio
            window.addEventListener('click', function(e) {
                const btn = e.target.closest('[data-audio]');
                if (btn) {
                    const text = btn.getAttribute('data-audio');
                    window.playAudio(text);
                }
            });
        })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
