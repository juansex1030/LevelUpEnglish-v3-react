<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUpEnglish Logo Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
        }

        #logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: white;
            text-align: center;
        }

        .rocket-icon {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            color: #00a8a8; /* Vibrant Teal */
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
        }

        .text-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-name {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -1px;
            margin: 0;
        }

        .level-up {
            color: #008080;
        }

        .english {
            color: #1a2a6c;
        }

        .tagline {
            font-size: 20px;
            margin-top: 5px;
            color: #555;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="logo-container" style="width: 800px; height: 400px; background: white; display: flex; align-items: center; justify-content: center; border: 1px solid #eee;">
        <svg class="rocket-icon" style="width: 120px; height: 120px; color: #00a8a8; margin-right: 30px;" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 8c.828 0 1.5-.672 1.5-1.5S8.828 5 8 5s-1.5.672-1.5 1.5S7.172 8 8 8"/>
            <path d="M11.953 8.81c-.195-3.388-.968-5.456-2.72-6.976C8.066.776 6.596.5 6.596.5s-.13.844-.13 1.833c0 .462.03.955.083 1.478l.068.651c.031.291.077.585.122.883-.114.077-.242.148-.381.213a6.012 6.012 0 0 0-.613.332c-.138.081-.276.16-.406.233-.505.284-.922.52-1.245.741C3.12 7.527 3.5 9 3.5 9c.338.4 2.141 2.305 4.5 2.5 2.359.195 4.25-1.35 4.5-2.5 0 0 .379-1.473-.547-2.19zM8 10c-1.5 0-3-1-3-3s1.5-3 3-3 3 1.5 3 3-1.5 3-3 3z"/>
        </svg>
        <div class="text-wrapper" style="display: flex; flex-direction: column;">
            <div class="brand-name" style="font-size: 84px; font-weight: 700; font-family: 'Poppins', sans-serif;">
                <span style="color: #008080;">LevelUp</span><span style="color: #1a2a6c;">English</span>
            </div>
            <div class="tagline" style="font-size: 22px; color: #666; letter-spacing: 5px; font-family: 'Poppins', sans-serif;">LEARN • PLAY • SUCCEED</div>
        </div>
    </div>

</body>
</html>
